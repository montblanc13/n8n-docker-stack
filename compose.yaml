name: "n8n-automation"

networks:
  n8n_bnetwork:
    name: n8n_bnetwork
    driver: bridge

volumes:
  n8n_data:
    name: n8n_data
  redis_data:
    name: redis_data
  pgvector_data:
    name: pgvector_data

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    pull_policy: always
    container_name: n8n-engine
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    ports:
      - "${N8N_BIND_IP:-127.0.0.1}:${N8N_HOST_PORT:-5678}:5678"
    environment:
      TZ: ${TZ:-Europe/Paris}
      NODE_ENV: production
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Europe/Paris}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_LOG_LEVEL: info
      N8N_LOG_OUTPUT: console,file
      N8N_LOG_FILE_LOCATION: /data/logs/n8n.log
      N8N_LOG_FILE_SIZE_MAX: 20
      N8N_LOG_FILE_COUNT_MAX: 10
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 72
      EXECUTIONS_DATA_PRUNE_MAX_COUNT: 0
      N8N_COMMUNITY_PACKAGES_ENABLED: "true"
      N8N_VERIFIED_PACKAGES_ENABLED: "true"
      N8N_UNVERIFIED_PACKAGES_ENABLED: "true"
      N8N_PUBLIC_API_DISABLED: "false"
      N8N_PUBLIC_API_SWAGGERUI_DISABLED: "false"
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: pgvector
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${PGVECTOR_N8N_DB:-n8n}
      DB_POSTGRESDB_USER: ${PGVECTOR_N8N_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${PGVECTOR_N8N_PASSWORD:-change-me-n8n-db}
      DB_POSTGRESDB_SCHEMA: ${PGVECTOR_N8N_SCHEMA:-n8n}
    volumes:
      - n8n_data:/home/node/.n8n
      - ${N8N_FILES_DIR:-./data/n8n/files}:/data/files
      - ${N8N_LOGS_DIR:-./data/n8n/logs}:/data/logs
      - ${N8N_BACKUPS_DIR:-./data/n8n/backups}:/data/backups
    networks:
      - n8n_bnetwork

  redis:
    image: redis/redis-stack:latest
    pull_policy: always
    container_name: redis-service
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me-redis}
      REDIS_ARGS: >-
        --requirepass ${REDIS_PASSWORD:-change-me-redis}
        --appendonly yes
    expose:
      - "6379"
      - "8001"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli --pass \"$${REDIS_PASSWORD}\" ping | grep -q PONG",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - n8n_bnetwork

  pgvector:
    image: pgvector/pgvector:pg18-trixie
    pull_policy: always
    container_name: pgvector-service
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Paris}
      POSTGRES_USER: ${PGVECTOR_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${PGVECTOR_ADMIN_PASSWORD:-change-me-postgres-admin}
      POSTGRES_DB: postgres
      PGVECTOR_N8N_DB: ${PGVECTOR_N8N_DB:-n8n}
      PGVECTOR_N8N_USER: ${PGVECTOR_N8N_USER:-n8n}
      PGVECTOR_N8N_PASSWORD: ${PGVECTOR_N8N_PASSWORD:-change-me-n8n-db}
      PGVECTOR_N8N_SCHEMA: ${PGVECTOR_N8N_SCHEMA:-n8n}
      PGVECTOR_CLIENT_DB: ${PGVECTOR_CLIENT_DB:-n8n_client}
      PGVECTOR_CLIENT_USER: ${PGVECTOR_CLIENT_USER:-n8n_client}
      PGVECTOR_CLIENT_PASSWORD: ${PGVECTOR_CLIENT_PASSWORD:-change-me-n8n-client-db}
      PGVECTOR_CLIENT_SCHEMA: ${PGVECTOR_CLIENT_SCHEMA:-n8n_client}
    expose:
      - "5432"
    ports:
      - "${PGVECTOR_BIND_IP:-127.0.0.1}:${PGVECTOR_HOST_PORT:-5432}:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql
      - ./postgres/initdb/01-init-n8n.sh:/docker-entrypoint-initdb.d/01-init-n8n.sh:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d postgres",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - n8n_bnetwork
